# Free backend hosting (Render) — use with Vercel frontend.
# Dashboard: https://dashboard.render.com/ → New → Blueprint → connect this repo.
# Docs: https://render.com/docs/free

services:
  - type: web
    name: career-path-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: Back-End/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health/db
    envVars:
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: career-path-db
          property: connectionString

databases:
  - name: career-path-db
    plan: free
    databaseName: careerpath
    user: careerpath
